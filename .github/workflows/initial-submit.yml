name: winget-pkgsへ初回登録
run-name: winget-pkgsへ初回登録 (v${{ inputs.version }})

on:
  workflow_dispatch:
    inputs:
      version:
        description: "登録するバージョン"
        required: true
        default: "1.21.0"

jobs:
  submit:
    name: 初回マニフェスト送信
    runs-on: windows-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: マニフェストの存在を確認
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          MANIFEST_DIR="manifests/s/sacloud/usacloud/${VERSION}"
          if [ ! -d "$MANIFEST_DIR" ]; then
            echo "::error::マニフェストが見つかりません: ${MANIFEST_DIR}"
            exit 1
          fi
          echo "マニフェストを確認: ${MANIFEST_DIR}"
          ls -la "$MANIFEST_DIR"

      - name: wingetcreateをインストール
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: winget-pkgsへPRを送信
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
        run: |
          ./wingetcreate.exe submit `
            --token ${{ secrets.WINGET_PAT }} `
            manifests/s/sacloud/usacloud/$env:VERSION
